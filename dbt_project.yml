name: 'dbt_anomaly_detection'
version: '0.1.0'
config-version: 2

# Require dbt version 1.3.0 or higher (but below 2.0.0)
require-dbt-version: [">=1.3.0", "<2.0.0"]

# SNOWFLAKE ONLY: This package uses Snowflake-specific features
# (information_schema, generator(), date functions)

profile: 'dbt_anomaly_detection'

# This setting configures which "profile" dbt uses for this project.
# For package consumers, this will use their own profile configuration.

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Package configuration
vars:
  # Seasonality settings (apply to both volume and freshness)
  seasonality_enabled: true          # Enable day-of-week seasonal baselines
  min_seasonal_observations: 4       # Minimum per-DOW observations before using seasonal stats

  # Volume anomaly detection settings
  volume_anomaly_detection:
    # Minimum historical observations required for anomaly detection
    min_historical_observations: 7

    # # Row Count CHANGE sensitivity (growth rate detection - more volatile)
    # # Calibrated from wide (quiet) to narrow (noisy) tolerance
    # row_count_change_sensitivity_very_low: 20.0   # 20σ threshold (RECOMMENDED DEFAULT)
    # row_count_change_sensitivity_low: 12.0        # 12σ threshold
    # row_count_change_sensitivity_medium: 8.0      # 8σ threshold
    # row_count_change_sensitivity_high: 6.0        # 6σ threshold
    # row_count_change_sensitivity_very_high: 5.0   # 5σ threshold

    # # Absolute ROW COUNT sensitivity (total size detection - more stable)
    # # Calibrated from wide (quiet) to narrow (noisy) tolerance
    # row_count_sensitivity_very_low: 16.0    # 16σ threshold (RECOMMENDED DEFAULT)
    # row_count_sensitivity_low: 8.0          # 8σ threshold
    # row_count_sensitivity_medium: 4.0       # 4σ threshold
    # row_count_sensitivity_high: 2.0         # 2σ threshold
    # row_count_sensitivity_very_high: 1.0    # 1σ threshold

    # Materiality thresholds - prevents statistically significant but meaningless alerts
    # Change-based: both must be exceeded to flag anomaly
    materiality_change_rows: 1000    # Minimum absolute row deviation from expected change
    materiality_change_pct: 2.0      # Minimum relative change (200%)
    # Size-based: either must be exceeded to flag anomaly
    materiality_count_rows: 100      # Minimum absolute row deviation from expected count
    materiality_count_pct: 0.05      # Minimum relative change (5%)

  # Freshness anomaly detection settings
  freshness_anomaly_detection:
    # Minimum historical observations required for anomaly detection
    min_historical_observations: 7
    # Sensitivity thresholds (sigma/standard deviations from mean)
    # Calibrated from wide (quiet) to narrow (noisy) tolerance
    sensitivity_very_low: 2.0    # 2σ threshold - wide, rare alerts (RECOMMENDED DEFAULT)
    sensitivity_low: 1.5         # 1.5σ threshold - catches significant staleness
    sensitivity_medium: 1.0      # 1σ threshold - balanced middle ground
    sensitivity_high: 0.75       # 0.75σ threshold - catches smaller staleness
    sensitivity_very_high: 0.5   # 0.5σ threshold - narrow, very noisy

snapshots:
  dbt_anomaly_detection:
    +target_schema: "{{ 'dbt_anomaly_detection' if not target.name.startswith('dev_') else target.schema }}"
    +tags: ["anomaly_detection", "snapshot"]

models:
  dbt_anomaly_detection:
    +materialized: incremental
    +on_schema_change: "append_new_columns"
    +schema: "{{ 'dbt_anomaly_detection' if not target.name.startswith('dev_') else target.schema }}"
    # In dev: uses dev_<username> schema
    # In prod: uses dbt_anomaly_detection schema
    volume:
      +tags: ["anomaly_detection", "volume"]
    freshness:
      +tags: ["anomaly_detection", "freshness"]
    testing:
      # Development/example models - disabled by default for published package
      +enabled: false
      +tags: ["anomaly_detection", "testing", "examples"]

tests:
  dbt_anomaly_detection:
    +store_failures: true
